apiVersion: v1
kind: ConfigMap
metadata:
  name: diracx-web-container-entrypoint
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-3"
    "helm.sh/resource-policy": keep
data:
  entrypoint.sh: |
    #!/bin/sh
    set -euo pipefail

    # Function to install and optionally build a node module
    install_node_module() {
      local path=$1
      local build=$2

      cd $path

      # We use "npm ci" instead of "npm install" so it will use the package-lock.json file
      # rather than using the package.json file. Using package.json would fail as the mount
      # is read-only so package-lock.json can't be edited.
      npm ci

      if [[ $build == "true" ]]; then
        npm run build
      fi

      exit 0
    }

    {{ if and .Values.developer.enabled .Values.developer.mountedNodeModuleToInstall }}
    # We are using a mounted node module, we need to install it
    install_node_module "{{ .Values.developer.sourcePath }}/{{ .Values.developer.mountedNodeModuleToInstall }}" false
    {{- end}}

    {{ if .Values.diracxWeb.nodeModuleToInstall }}
    # We are using a custom branch, we need to install it and built it
    git clone -b {{ .Values.diracxWeb.nodeModuleToInstall }} /diracx-web
    install_node_module "/diracx-web" true
    {{- end}}
